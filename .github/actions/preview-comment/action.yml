name: Preview status comment
description: >-
  Create or update a single sticky comment on the PR that owns this run. Finds
  the bot's previous comment by a hidden marker and edits it, so the deploy and
  teardown workflows share one self-updating status comment instead of spamming
  the thread.

inputs:
  body:
    description: Markdown body to show below the status header.
    required: true
  pr-number:
    description: PR number to comment on (defaults to the triggering PR).
    required: false
    default: ""
  token:
    description: GITHUB_TOKEN with pull-requests:write.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Upsert sticky comment
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        COMMENT_BODY: ${{ inputs.body }}
        PR_NUMBER_INPUT: ${{ inputs.pr-number }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          // Hidden marker that uniquely identifies our comment. Kept in an HTML
          // comment so it's invisible in the rendered thread.
          const MARKER = "<!-- lil-media-pr-preview -->";

          const prNumber = Number(
            process.env.PR_NUMBER_INPUT || context.payload.pull_request?.number
          );
          if (!Number.isInteger(prNumber)) {
            core.setFailed("No PR number available to comment on.");
            return;
          }

          // Body comes from env, never interpolated into the script, so PR/run
          // content can't inject code.
          const body = `${MARKER}\n${process.env.COMMENT_BODY}`;

          const { owner, repo } = context.repo;

          // Find our previous comment, paging through all of them.
          const existing = await github.paginate(
            github.rest.issues.listComments,
            { owner, repo, issue_number: prNumber, per_page: 100 }
          );
          const mine = existing.find((c) => c.body?.includes(MARKER));

          if (mine) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: mine.id,
              body,
            });
            core.info(`Updated preview comment ${mine.id} on PR #${prNumber}.`);
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
            core.info(`Created preview comment on PR #${prNumber}.`);
          }
