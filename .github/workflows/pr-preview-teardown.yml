# Per-PR preview teardown.
#
# When a PR closes (merged or not), destroy the ephemeral environment created by
# pr-preview-deploy.yml: the PR Worker (lil-media-web-pr-<N>) and its isolated D1
# database (lil-media-pr-<N>). The shared preview R2 bucket is left alone — its
# objects are random-keyed and bounded by a lifecycle rule (see
# docs/preview-deployments.md), so there's nothing per-PR to delete.
#
# Deletion goes straight to the Cloudflare API rather than `wrangler delete`:
# it's deterministic (no confirmation prompt to satisfy in CI), needs no
# dependency install, and lets us treat "already gone" (404) as success so
# teardown is fully idempotent.

name: PR Preview Teardown

on:
  pull_request:
    types: [closed]

# Independent of the deploy concurrency group so a close is never cancelled by an
# in-flight build (and never cancels one). Serialized per-PR; not cancellable.
concurrency:
  group: pr-preview-teardown-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  teardown:
    name: Destroy preview
    # Same-repo only — matches the deploy gate. Fork PRs never got a preview.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: preview
    permissions:
      contents: read # checkout (needed for the local comment action)
      pull-requests: write # update the sticky status comment
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Resolve preview identifiers
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          {
            echo "PR_WORKER_NAME=lil-media-web-pr-${pr}"
            echo "PR_DB_NAME=lil-media-pr-${pr}"
          } >> "$GITHUB_ENV"

      - name: Destroy Worker and isolated D1
        id: destroy
        run: bash scripts/preview/destroy-preview.sh

      - name: Comment — torn down
        uses: ./.github/actions/preview-comment
        with:
          body: |
            ### 🧹 Preview environment torn down

            | Resource | Status |
            |---|---|
            | Worker `${{ env.PR_WORKER_NAME }}` | ${{ steps.destroy.outputs.worker_status }} |
            | Database `${{ env.PR_DB_NAME }}` | ${{ steps.destroy.outputs.db_status }} |

            Closed PRs don't keep a preview running.
