name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web cf-typegen
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Opt-in E2E (Playwright + Clerk). Enable by setting Actions variable
  # RUN_E2E=true and adding the preview environment's dev Clerk keys:
  #   variable VITE_CLERK_PUBLISHABLE_KEY (pk_test_…) + secret CLERK_SECRET_KEY (sk_test_…).
  # Uses +clerk_test users, so it never touches real accounts.
  e2e:
    name: E2E (Playwright + Clerk)
    needs: verify
    if: vars.RUN_E2E == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web cf-typegen
      - run: pnpm --filter web exec playwright install --with-deps chromium
      # Mirror local .dev.vars so the dev server + test runner get the dev keys.
      - run: |
          printf 'VITE_CLERK_PUBLISHABLE_KEY=%s\nCLERK_SECRET_KEY=%s\n' \
            "${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}" "${{ secrets.CLERK_SECRET_KEY }}" \
            > apps/web/.dev.vars
      # The dev server uses a local (miniflare) D1 — migrate it so SSR doesn't
      # 500 on an empty database and the webServer becomes ready.
      - run: pnpm --filter web exec wrangler d1 migrations apply lil-media --local
      - run: pnpm --filter web test:e2e
        env:
          CI: "true"

  # main -> preview/staging Worker (lil-media-web-preview), Clerk DEV keys.
  # CLOUDFLARE_ENV=preview makes the Cloudflare Vite plugin bake the preview
  # Worker name + preview D1 into the build output.
  deploy-preview:
    name: Deploy preview (staging)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    env:
      CLOUDFLARE_ENV: preview
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web cf-typegen
      # Publishable key (DEV) is public; baked into the client bundle at build.
      - run: echo "VITE_CLERK_PUBLISHABLE_KEY=${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}" > apps/web/.env
      - run: pnpm --filter web build
      - name: Apply preview D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply lil-media-preview --remote
      - name: Deploy preview Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  # Manual only — production Worker (lil-media-web), Clerk PROD keys + real
  # domain. Trigger from the Actions tab when you're ready to ship.
  deploy-production:
    name: Deploy production
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web cf-typegen
      - run: echo "VITE_CLERK_PUBLISHABLE_KEY=${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}" > apps/web/.env
      - run: pnpm --filter web build
      - name: Apply production D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply lil-media --remote
      - name: Deploy production Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
