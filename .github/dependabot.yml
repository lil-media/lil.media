# Keeps the SHA-pinned GitHub Actions current. Pinning to a commit SHA is the
# hardening win (a tag can be moved to malicious code); Dependabot is what stops
# those pins from silently going stale. It bumps the SHA and the `# vX.Y.Z`
# comment together across both workflows and the composite action.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # One PR for routine action bumps instead of one per action.
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore
